apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-checkout-payment
  namespace: rca-otel-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: payment
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
