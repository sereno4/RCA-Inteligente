apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-prometheus
  namespace: rca-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-prometheus
  template:
    metadata:
      labels:
        app: mcp-prometheus
    spec:
      containers:
        - name: mcp
          image: mcp-prometheus:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-prometheus
  namespace: rca-system
spec:
  selector:
    app: mcp-prometheus
  ports:
    - port: 8000
      targetPort: 8000
---
